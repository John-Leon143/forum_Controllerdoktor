{% load static %}

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Forum ControllerDoktor{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/reset.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
  <nav>
    <div class="nav-container">
      <div class="logo">
        <a href="{% url 'forum_home' %}"><h1>Forum</h1></a>
      </div>

      <div class="search-container">
        <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" class="search-input" placeholder="Suchen...">
      </div>

      <div class="nav-links">
        <a href="#reviews">Reviews</a>
        <a href="{% url 'forum' %}">Forum</a>
        <a href="#tutorials">Tutorials</a>
        <a href="{% url 'login' %}">
          <button class="login-btn">
            <svg class="login-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
              <polyline points="10 17 15 12 10 7"></polyline>
              <line x1="15" x2="3" y1="12" y2="12"></line>
            </svg>
            Login
          </button>
        
        </a>
        
      </div>
    </div>
  </nav>


    <main>
        {% block content %}
        <!-- Content der Seite -->


        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 ControllerDoktor</p>
    </footer>
</body>
</html>
